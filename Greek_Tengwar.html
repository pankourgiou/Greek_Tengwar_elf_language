<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

:root {
  --bg:      #edecf0;
  --bg2:     #e5e4e9;
  --border:  #c2bfcc;
  --ink:     #1c1f4a;
  --inkdim:  #4a4d72;
  --inkfaint:#9090b0;
  --card-bg: #e9e8ed;
  --radius:  6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
  background-image: radial-gradient(ellipse at 50% 0%, rgba(28,31,74,0.07) 0%, transparent 65%);
}

header { text-align: center; padding: 42px 20px 24px; border-bottom: 1px solid var(--border); }
header h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.4rem, 4vw, 2.6rem);
  font-weight: 400; letter-spacing: 0.34em; color: var(--ink);
}
header p { margin-top: 10px; font-style: italic; color: var(--inkdim); font-size: 1rem; letter-spacing: 0.06em; font-weight: 300; }

.tabs { display: flex; justify-content: center; gap: 2px; padding: 22px 20px 0; }
.tab {
  background: transparent; border: 1px solid var(--border); border-bottom: none;
  color: var(--inkfaint); font-family: 'Cinzel', serif; font-size: 0.68rem;
  letter-spacing: 0.2em; padding: 9px 30px; cursor: pointer; transition: all 0.2s;
}
.tab:hover { color: var(--ink); border-color: var(--inkdim); }
.tab.active { color: var(--ink); border-color: var(--inkdim); background: var(--bg2); }

.panel { display: none; padding: 26px 20px 48px; max-width: 980px; margin: 0 auto; }
.panel.active { display: block; }

.lbl { font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.22em; color: var(--inkdim); margin-bottom: 10px; }

#build-out, #type-out {
  min-height: 120px; border: 1px solid var(--border); background: var(--bg2);
  border-radius: var(--radius); padding: 16px; display: flex; flex-wrap: wrap;
  gap: 6px; align-items: flex-start; margin-bottom: 14px;
}
.ph { color: var(--inkfaint); font-style: italic; font-size: 0.9rem; align-self: center; }

.gc {
  display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 5px;
  border: 1px solid transparent; border-radius: var(--radius); transition: all 0.15s; background: var(--card-bg);
}
.gc.clickable { cursor: pointer; }
.gc.clickable:hover { border-color: var(--inkdim); box-shadow: 0 2px 8px rgba(28,31,74,0.12); }
.gc img { width: 52px; height: 52px; display: block; border-radius: 3px; }
.gl { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 14px; font-weight: 400; color: var(--inkdim); letter-spacing: 0.04em; }
.sp { width: 22px; height: 36px; }

.btn-row { display: flex; gap: 8px; margin-bottom: 26px; }
.btn {
  background: transparent; border: 1px solid var(--border); color: var(--inkdim);
  font-family: 'Cinzel', serif; font-size: 0.62rem; letter-spacing: 0.15em;
  padding: 7px 18px; cursor: pointer; border-radius: var(--radius); transition: all 0.2s;
}
.btn:hover { border-color: var(--inkdim); color: var(--ink); }

#type-input {
  width: 100%; background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--ink);
  font-family: 'Cormorant Garamond', Georgia, serif; font-size: 1.15rem;
  padding: 12px 14px; resize: vertical; min-height: 80px; outline: none;
  margin-bottom: 14px; letter-spacing: 0.06em;
}
#type-input:focus { border-color: var(--inkdim); }
#type-input::placeholder { color: var(--inkfaint); font-style: italic; }

#picker {
  display: flex; flex-wrap: wrap; gap: 6px; padding: 16px;
  border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2);
}
.pc {
  display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 7px 5px;
  border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer;
  background: var(--card-bg); transition: all 0.15s; width: 76px;
}
.pc:hover { border-color: var(--inkdim); box-shadow: 0 2px 10px rgba(28,31,74,0.14); }
.pc img { width: 60px; height: 60px; border-radius: 3px; }
.pl { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 15px; font-weight: 400; color: var(--inkdim); letter-spacing: 0.04em; }

.sp-key {
  align-self: center; padding: 8px 20px; border: 1px solid var(--border);
  border-radius: var(--radius); font-family: 'Cinzel', serif; font-size: 0.62rem;
  letter-spacing: 0.15em; color: var(--inkdim); cursor: pointer; transition: all 0.15s;
}
.sp-key:hover { border-color: var(--inkdim); color: var(--ink); }

canvas { display: none; }
</style>
</head>
<body>
<div class="title">CIPHER</div>
<div class="sub">Encrypt your words in ancient script</div>
<div class="rule"></div>

<div class="tabs">
  <button class="tab active" id="tab-build" onclick="setMode('build')">BUILD — click glyphs</button>
  <button class="tab" id="tab-type" onclick="setMode('type')">ENCRYPT — type message</button>
</div>

<div class="mode active" id="mode-build">
  <div class="lbl">OUTPUT</div>
  <div class="glyph-out" id="build-out"><span class="ph">Click glyphs below to compose...</span></div>
  <div class="actions">
    <button class="btn" onclick="buildDelete()">DELETE</button>
    <button class="btn" onclick="buildClear()">CLEAR</button>
    <button class="btn dl" onclick="doDownload('build-out')">DOWNLOAD PNG</button>
  </div>
  <div class="lbl">ALPHABET</div>
  <div id="picker"></div>
</div>

<div class="mode" id="mode-type">
  <div class="lbl">YOUR MESSAGE</div>
  <textarea id="type-input" placeholder="Type in Greek  α β γ δ ε..." oninput="typeTranslate()" spellcheck="false"></textarea>
  <div class="lbl">ENCRYPTED OUTPUT</div>
  <div class="glyph-out" id="type-out"><span class="ph">Your cipher will appear here...</span></div>
  <div class="actions">
    <button class="btn" onclick="document.getElementById('type-input').value='';typeTranslate()">CLEAR</button>
    <button class="btn dl" onclick="doDownload('type-out')">DOWNLOAD PNG</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
// Load glyphs safely from JSON tag
var G = JSON.parse(document.getElementById('glyph-data').textContent);

function setMode(m) {
  document.getElementById('tab-build').classList.toggle('active', m === 'build');
  document.getElementById('tab-type').classList.toggle('active', m === 'type');
  document.getElementById('mode-build').classList.toggle('active', m === 'build');
  document.getElementById('mode-type').classList.toggle('active', m === 'type');
  if (m === 'type') document.getElementById('type-input').focus();
}

function makeCell(ch, clickable, onRemove) {
  var cell = document.createElement('div');
  cell.className = 'gc' + (clickable ? ' clickable' : '');
  if (clickable) cell.onclick = onRemove;
  if (ch === ' ') {
    var sp = document.createElement('div');
    sp.className = 'sp';
    cell.appendChild(sp);
  } else if (G[ch]) {
    var img = document.createElement('img');
    img.src = G[ch];
    img.alt = ch;
    cell.appendChild(img);
    var lbl = document.createElement('div');
    lbl.className = 'gl';
    lbl.textContent = ch;
    cell.appendChild(lbl);
  } else {
    var u = document.createElement('div');
    u.style.cssText = 'width:48px;height:48px;display:flex;align-items:center;justify-content:center;font-family:Cinzel,serif;font-size:22px;color:var(--gdim);';
    u.textContent = ch;
    cell.appendChild(u);
    var lbl2 = document.createElement('div');
    lbl2.className = 'gl';
    lbl2.textContent = ch;
    cell.appendChild(lbl2);
  }
  return cell;
}

// BUILD MODE
var buildChars = [];
function buildRender() {
  var out = document.getElementById('build-out');
  if (!buildChars.length) { out.innerHTML = '<span class="ph">Click glyphs below to compose...</span>'; return; }
  out.innerHTML = '';
  buildChars.forEach(function(ch, idx) {
    out.appendChild(makeCell(ch, true, function() { buildChars.splice(idx, 1); buildRender(); }));
  });
}
function buildAdd(ch) { buildChars.push(ch); buildRender(); }
function buildDelete() { buildChars.pop(); buildRender(); }
function buildClear() { buildChars = []; buildRender(); }

// TYPE MODE
function typeTranslate() {
  var text = document.getElementById('type-input').value;
  var out = document.getElementById('type-out');
  if (!text) { out.innerHTML = '<span class="ph">Your cipher will appear here...</span>'; return; }
  out.innerHTML = '';
  for (var i = 0; i < text.length; i++) {
    var ch = text[i];
    if (ch === '\n') {
      var br = document.createElement('div');
      br.style.cssText = 'width:100%;height:8px;';
      out.appendChild(br);
    } else {
      out.appendChild(makeCell(ch, false, null));
    }
  }
}

// DOWNLOAD
var preloaded = {};
Object.keys(G).forEach(function(k) {
  var im = new Image();
  im.src = G[k];
  preloaded[k] = im;
});

function doDownload(outId) {
  var cells = document.getElementById(outId).querySelectorAll('.gc');
  if (!cells.length) return;
  var GSIZE = 72, PAD = 20, GAP = 4, LABEL = 14;
  var perRow = Math.min(cells.length, 14);
  var rows = Math.ceil(cells.length / perRow);
  var CW = perRow * (GSIZE + GAP) + PAD * 2;
  var CH = rows * (GSIZE + LABEL + GAP) + PAD * 2;
  var canvas = document.getElementById('canvas');
  canvas.width = CW; canvas.height = CH;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#edecf0';
  ctx.fillRect(0, 0, CW, CH);
  var col = 0, row = 0;
  cells.forEach(function(cell) {
    var glEl = cell.querySelector('.gl');
    var ch = glEl ? glEl.textContent : ' ';
    var x = PAD + col * (GSIZE + GAP);
    var y = PAD + row * (GSIZE + LABEL + GAP);
    if (ch !== ' ' && preloaded[ch] && preloaded[ch].complete) {
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.beginPath();
      ctx.roundRect(x, y, GSIZE, GSIZE, 3);
      ctx.fill();
      ctx.drawImage(preloaded[ch], x, y, GSIZE, GSIZE);
      ctx.fillStyle = 'rgba(28,31,74,0.6)';
      ctx.font = 'bold 9px serif';
      ctx.textAlign = 'center';
      ctx.fillText(ch, x + GSIZE / 2, y + GSIZE + 11);
    } else if (ch !== ' ') {
      ctx.fillStyle = 'rgba(28,31,74,0.12)';
      ctx.fillRect(x, y, GSIZE, GSIZE);
      ctx.fillStyle = '#1c1f4a';
      ctx.font = 'bold 24px serif';
      ctx.textAlign = 'center';
      ctx.fillText(ch, x + GSIZE / 2, y + GSIZE / 2 + 8);
    }
    col++;
    if (col >= perRow) { col = 0; row++; }
  });
  var link = document.createElement('a');
  link.download = 'cipher.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// KEYBOARD
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('mode-build').classList.contains('active')) return;
  if (e.ctrlKey || e.metaKey) return;
  if (e.key === 'Backspace') { e.preventDefault(); buildDelete(); }
  else if (e.key === ' ') { e.preventDefault(); buildAdd(' '); }
  else if (e.key.length === 1 && 'αβγδεζηθικλμνξοπρστυφχψω'.includes(e.key)) buildAdd(e.key);
});

// BUILD PICKER
var picker = document.getElementById('picker');
'αβγδεζηθικλμνξοπρστυφχψω'.split('').forEach(function(letter) {
  var card = document.createElement('div');
  card.className = 'pc';
  card.onclick = function() { buildAdd(letter); };
  if (G[letter]) {
    var img = document.createElement('img');
    img.src = G[letter];
    card.appendChild(img);
  } else {
    var u = document.createElement('div');
    u.style.cssText = 'width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-family:Cinzel,serif;font-size:18px;color:var(--gdim);border:1px dashed;border-radius:2px;';
    u.textContent = letter.toUpperCase();
    card.appendChild(u);
  }
  var lbl = document.createElement('div');
  lbl.className = 'pl';
  lbl.textContent = letter;
  card.appendChild(lbl);
  picker.appendChild(card);
});
var spk = document.createElement('div');
spk.className = 'sp-key';
spk.textContent = 'SPACE';
spk.onclick = function() { buildAdd(' '); };
picker.appendChild(spk);
</script>
